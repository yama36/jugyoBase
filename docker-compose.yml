services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: jugyoBase
    ports:
      - "5432:5432"
    volumes:
      - jugyoBase_pg:/var/lib/postgresql/data

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: minio12345678
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - jugyoBase_minio:/data

volumes:
  jugyoBase_pg:
  jugyoBase_minio:
